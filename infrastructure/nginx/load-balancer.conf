# Beleqet Load Balancer — Nginx upstream configuration
# Addresses issue #41 (Performance & Network): traffic distribution, health checks,
# sticky sessions, and horizontal scaling without an in-app HTTP router.
#
# Strategies (enable ONE approach at a time):
#   - Round Robin   — default Nginx upstream behaviour
#   - Least Conn    — uncomment `least_conn;`
#   - IP Hash       — uncomment `ip_hash;` for sticky sessions by client IP
#
# Health checks:
#   Passive probes via max_fails + fail_timeout. Unhealthy backends are skipped
#   automatically; when they recover they re-enter the pool (failover).
#
# Multi-currency / region (global scaling):
#   X-Currency and X-Region headers are forwarded to backends unchanged.

upstream beleqet_backend {
    # Strategy: Round Robin (default)
    # Strategy: Least Connections — uncomment:
    # least_conn;
    # Strategy: IP Hash sticky sessions — uncomment:
    # ip_hash;

    server backend-1:4000 max_fails=3 fail_timeout=30s;
    server backend-2:4000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;

    # LB liveness (does not hit backends)
    location = /lb-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        proxy_pass http://beleqet_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Multi-currency & region routing headers
        proxy_set_header X-Currency $http_x_currency;
        proxy_set_header X-Region $http_x_region;
        proxy_set_header X-Session-Id $cookie_beleqet_session;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
